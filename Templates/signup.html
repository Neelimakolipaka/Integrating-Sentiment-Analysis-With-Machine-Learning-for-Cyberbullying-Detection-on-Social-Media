<!DOCTYPE html>
<html lang="zxx">
<head>
  <meta charset="utf-8">
  <title>Sign Up - CBD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../static/plugins/bootstrap/bootstrap.min.css">
  <link rel="stylesheet" href="../static/plugins/themify-icons/themify-icons.css">
  <link href="../static/css/style.css" rel="stylesheet">
  <link rel="shortcut icon" href="../static/images/favicon-32x32.png" type="image/x-icon">
  <link rel="shortcut icon" href="../static/images/favicon.ico" type="image/x-icon">
  <link rel="icon" href="../static/images/favicon.ico" type="image/x-icon">
</head>
<body class="bg-auth">
  <header class="py-4 text-center">
    <a class="navbar-brand" href="/home"><span class="navbar-logo-text">CBD</span></a>
  </header>
  <div class="signup-container">
    <div class="signup-card">
      <h3 class="text-center mb-2 font-weight-bold">Sign Up</h3>
      {% if message %}
      <div class="alert alert-danger text-center">{{ message }}</div>
      {% endif %}
      <form action="/signup" method="POST">
        <div class="form-row">
          <div class="form-group col-md-6">
            <label for="user">Username</label>
            <input type="text" class="form-control" id="user" name="user" placeholder="Enter username (min 6 chars)" required>
          </div>
          <div class="form-group col-md-6">
            <label for="name">Full Name</label>
            <input type="text" class="form-control" id="name" name="name" placeholder="Enter your full name" required>
          </div>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="mobile">Mobile</label>
          <input type="text" class="form-control" id="mobile" name="mobile" placeholder="10-digit mobile (starts 6-9)" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" class="form-control" id="password" name="password" placeholder="At least 8 chars, 1 uppercase, 1 lowercase, 1 number" required>
        </div>
        <button type="submit" class="btn btn-block font-weight-bold" style="background:linear-gradient(90deg,#ff512f 0%,#dd2476 100%); color:#fff; border:none; font-size:1.1rem; border-radius:2rem;">Sign Up</button>
      </form>
      <div class="text-center mt-3">
        <span>Already have an account? <a href="/signin" style="color:#2575fc; font-weight:600;">Sign In</a></span>
      </div>
    </div>
  </div>
  <script src="../static/plugins/jQuery/jquery.min.js"></script>
  <script src="../static/plugins/bootstrap/bootstrap.min.js"></script>
</body>
</html>
